seed: 42

paths:
  train_csv_path: data/stage_1_train_images.csv
  test_csv_path: data/stage_1_test_images.csv
  images_dir: data/png_images
  masks_dir: data/png_masks
  artifacts_dir: artifacts/tmp_smoke

data:
  image_size: 256
  batch_size: 2
  num_workers: 0
  positive_only: false
  min_mask_coverage: 0.0
  val_size: 0.15
  test_size: 0.15
  drop_missing_positive_masks: true
  num_prediction_examples: 4
  prediction_examples_split: test
  prediction_examples_positive_only: false

training:
  model_name: unet
  base_channels: 8
  loss_name: bce_dice
  learning_rate: 0.0001
  weight_decay: 1.0e-05
  num_epochs: 3
  threshold: 0.5
  threshold_candidates: [0.3, 0.4, 0.5, 0.6, 0.7]
  scheduler_factor: 0.5
  scheduler_patience: 2
  mixed_precision: true
  early_stopping_patience: 3
  device: cuda
